<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Map & Safety Tracking | SafeReport Telangana</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: calc(100vh - 80px);
            width: 100%;
            z-index: 1;
        }
        .map-ui {
            position: absolute;
            top: 100px;
            left: 20px;
            z-index: 1000;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .map-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
        }
        .search-bar {
            background: white;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 1rem;
        }
        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }
        .patrol-status {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            background: white;
            border-radius: var(--radius-lg);
            margin-top: 1rem;
            border-left: 5px solid var(--emergency-red);
        }
        .tracking-indicator {
            width: 12px;
            height: 12px;
            background: var(--emergency-red);
            border-radius: 50%;
            animation: ping 1.5s infinite;
        }
        @keyframes ping {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="SafeReport Logo" style="height: 35px;">
            </a>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="sos.html" class="btn btn-sos">SOS Emergency</a>
            </nav>
        </div>
    </header>

    <div class="map-ui">
        <div class="map-card">
            <div class="search-bar">
                <i data-lucide="search" style="color: var(--text-muted); width: 18px;"></i>
                <input type="text" placeholder="Search for area or police station...">
            </div>
            
            <h3 style="margin: 1.5rem 0 1rem 0; font-size: 1.1rem; color: var(--primary-blue);">Live Patrol Tracking</h3>
            
            <div class="patrol-status">
                <div class="tracking-indicator"></div>
                <div style="flex: 1;">
                    <p style="font-weight: 700; font-size: 0.95rem;">TS-Patrol Alpha-1</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Moving towards Gachibowli Junction</p>
                </div>
                <div style="text-align: right;">
                    <p style="font-weight: 700; color: var(--primary-blue);">4 min</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">ETA</p>
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <h4 style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--text-muted);">Safety Overview</h4>
                <div style="display: grid; gap: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                        <span>Safe Zones Detected</span>
                        <span style="color: var(--success-green); font-weight: 700;">08 Areas</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                        <span>High Risk Hotspots</span>
                        <span style="color: var(--emergency-red); font-weight: 700;">02 Areas</span>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn btn-primary" style="width: 100%; padding: 1.25rem;">
            <i data-lucide="phone"></i> Call Central Emergency (100)
        </button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();

        // Initialize Map
        const map = L.map('map', {zoomControl: false}).setView([17.4401, 78.3489], 15);
        
        // Add zoom control to top right
        L.control.zoom({position: 'topright'}).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Custom Icons
        const stationIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2567/2567806.png',
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        const patrolIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2555/2555013.png',
            iconSize: [45, 45],
            iconAnchor: [22, 22]
        });

        const userIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
            iconSize: [30, 30]
        });

        // Add User Location
        L.marker([17.4401, 78.3489], {icon: userIcon}).addTo(map).bindPopup('<b>You are here</b>').openPopup();

        // Add Police Stations
        const stations = [
            {name: 'Gachibowli PS', lat: 17.4435, lng: 78.3450},
            {name: 'Madhapur PS', lat: 17.4485, lng: 78.3560}
        ];

        stations.forEach(s => {
            L.marker([s.lat, s.lng], {icon: stationIcon}).addTo(map).bindPopup(`<b>${s.name}</b><br>Available Units: 04`);
        });

        // High Risk Hotspots
        L.circle([17.4350, 78.3420], {
            color: 'red', fillColor: '#f03', fillOpacity: 0.15, radius: 400
        }).addTo(map).bindPopup('<b>Caution: High Incident Zone</b><br>Report suspicious activity.');

        // Moving Patrol Simulation (Swiggy Style)
        let patrolLat = 17.4450;
        let patrolLng = 78.3550;
        const patrolMarker = L.marker([patrolLat, patrolLng], {icon: patrolIcon}).addTo(map)
            .bindPopup('<b>TS Patrol Alpha-1</b><br>Status: On Duty');

        const pathPoints = [
            [17.4450, 78.3550], [17.4445, 78.3530], [17.4430, 78.3500], [17.4415, 78.3480], [17.4405, 78.3490]
        ];
        
        let pointIndex = 0;
        function animatePatrol() {
            const start = pathPoints[pointIndex];
            const end = pathPoints[(pointIndex + 1) % pathPoints.length];
            
            let frame = 0;
            const frames = 100;
            
            function move() {
                if (frame <= frames) {
                    const lat = start[0] + (end[0] - start[0]) * (frame / frames);
                    const lng = start[1] + (end[1] - start[1]) * (frame / frames);
                    patrolMarker.setLatLng([lat, lng]);
                    frame++;
                    requestAnimationFrame(move);
                } else {
                    pointIndex = (pointIndex + 1) % (pathPoints.length - 1);
                    setTimeout(animatePatrol, 2000);
                }
            }
            move();
        }

        animatePatrol();

        // Polyline for Patrol Path
        L.polyline(pathPoints, {color: 'rgba(230, 57, 70, 0.4)', weight: 5, dashArray: '10, 10'}).addTo(map);

    </script>
</body>
</html>
