<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Station Locator | SafeReport Telangana</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: calc(100vh - 80px);
            width: 100%;
        }
        .map-overlay {
            position: absolute;
            top: 100px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            width: 320px;
            box-shadow: var(--shadow-lg);
        }
        .station-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.3s;
        }
        .station-item:hover {
            background: var(--bg-light);
        }
        .station-item h4 {
            font-size: 1rem;
            color: var(--primary-blue);
        }
        .station-item p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .emergency-btn {
            width: 100%;
            margin-top: 1rem;
            background: var(--emergency-red);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="shield-check"></i>
                Safe<span>Report</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="complaint.html">New Complaint</a>
                <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
            </nav>
        </div>
    </header>

    <div class="map-overlay">
        <h3 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="search" style="width: 20px;"></i>
            Nearby Stations
        </h3>
        <div style="max-height: 400px; overflow-y: auto;">
            <div class="station-item">
                <h4>Gachibowli Police Station</h4>
                <p>1.2 km away · 5 mins ETA</p>
                <p style="color: var(--success-green); font-weight: 600;">Status: High Alert</p>
            </div>
            <div class="station-item">
                <h4>Madhapur Police Station</h4>
                <p>2.8 km away · 12 mins ETA</p>
                <p>Status: Regular</p>
            </div>
            <div class="station-item">
                <h4>Banjara Hills PS</h4>
                <p>5.5 km away · 18 mins ETA</p>
                <p>Status: Active Patrol</p>
            </div>
        </div>
        <button class="emergency-btn">
            <i data-lucide="phone" style="width: 16px; display: inline-block; vertical-align: middle; margin-right: 5px;"></i>
            Call Nearest Station
        </button>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        
        // Initialize Map (Centered on Hyderabad/Gachibowli approx)
        const map = L.map('map').setView([17.4401, 78.3489], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Custom Police Icon
        const policeIcon = L.icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const patrolIcon = L.icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Add Stations
        L.marker([17.4431, 78.3459], {icon: policeIcon}).addTo(map)
            .bindPopup('<b>Gachibowli Police Station</b><br>Phone: 040 2314 7454')
            .openPopup();

        // Moving Patrol Marker (Simulation)
        let patrolLat = 17.4381;
        let patrolLng = 78.3559;
        const patrolMarker = L.marker([patrolLat, patrolLng], {icon: patrolIcon}).addTo(map)
            .bindPopup('<b>Mobile Patrol TS-01-A</b><br>ETA to Your Location: 3 mins');

        function movePatrol() {
            patrolLat += 0.0001;
            patrolLng -= 0.0001;
            patrolMarker.setLatLng([patrolLat, patrolLng]);
            setTimeout(movePatrol, 1000);
        }
        
        movePatrol();

        // Highlight Safe Zones (Circles)
        L.circle([17.4401, 78.3489], {
            color: 'green',
            fillColor: '#22c55e',
            fillOpacity: 0.1,
            radius: 500
        }).addTo(map).bindPopup('Safe Zone: High Surveillance Area');
    </script>
    <script type='module' src='js/global-auth.js'></script>
</body>
</html>
