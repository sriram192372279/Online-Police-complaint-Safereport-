<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency SOS | SafeReport Telangana</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #020617;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .sos-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.9)), url('emergency_sos_illustration_1777259503349.png') center/cover;
            z-index: 1;
            filter: blur(5px);
        }
        .sos-container {
            text-align: center;
            z-index: 10;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 100px rgba(230, 57, 70, 0.2);
        }
        .sos-btn-outer {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 2px solid rgba(230, 57, 70, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 3rem auto;
            position: relative;
        }
        .sos-btn-inner {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: var(--emergency-red);
            border: none;
            color: white;
            font-size: 3rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.5);
            transition: all 0.2s;
            z-index: 2;
        }
        .sos-btn-inner:active {
            transform: scale(0.92);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.8);
        }
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--emergency-red);
            opacity: 0.3;
            animation: pulse-out 2s infinite;
        }
        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .status-msg {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--emergency-red);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .info-panel {
            margin-top: 3rem;
            padding: 1.5rem 2.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-full);
            display: flex;
            gap: 3rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .location-dot {
            width: 12px;
            height: 12px;
            background: var(--success-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.75rem;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="sos-bg"></div>

    <a href="dashboard.html" style="position: absolute; top: 3rem; left: 3rem; color: white; display: flex; align-items: center; gap: 0.75rem; z-index: 10; font-weight: 600; opacity: 0.8;">
        <i data-lucide="arrow-left"></i> Return to Dashboard
    </a>

    <div class="sos-container fade-up">
        <h2 style="font-size: 1.5rem; margin-bottom: 3rem; opacity: 0.9; letter-spacing: 0.1em; text-transform: uppercase;">Emergency Response Hub</h2>
        <div class="sos-btn-outer">
            <div class="pulse-ring"></div>
            <div class="pulse-ring" style="animation-delay: 0.5s;"></div>
            <button class="sos-btn-inner" id="sos-trigger">
                <i data-lucide="alert-triangle" style="width: 60px; height: 60px;"></i>
                SOS
            </button>
        </div>
        <p class="status-msg" id="status-text">Hold to Broadcast Alert</p>
        <p style="opacity: 0.5; margin-top: 1.5rem; font-size: 0.85rem;">Your identity and location will be sent to the nearest patrol unit.</p>
    </div>

    <div class="info-panel z-10">
        <div style="display: flex; align-items: center;">
            <span class="location-dot"></span>
            <span style="font-size: 0.9rem; opacity: 0.8;">GPS: <strong id="coords" style="font-family: monospace;">Locking...</strong></span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="shield-check" style="width: 18px; color: var(--accent-gold);"></i>
            <span style="font-size: 0.9rem; opacity: 0.8;">Network: <strong style="color: var(--success-green);">Secure</strong></span>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        lucide.createIcons();
        
        const sosBtn = document.getElementById('sos-trigger');
        const statusText = document.getElementById('status-text');
        const coordsText = document.getElementById('coords');
        let isSending = false;

        // Auto-lock location on page load
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                coordsText.innerText = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
            });
        }

        sosBtn.addEventListener('click', async () => {
            if(isSending) return;
            
            isSending = true;
            statusText.innerText = "Transmitting Signal...";
            statusText.style.color = "#fbbf24";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    coordsText.innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                    
                    try {
                        const user = auth.currentUser;
                        // Save SOS Alert to Firestore
                        await addDoc(collection(db, "sos_alerts"), {
                            uid: user ? user.uid : 'Guest',
                            email: user ? user.email : 'Guest',
                            name: user ? user.displayName : 'Unknown Citizen',
                            location: { lat, lng },
                            timestamp: serverTimestamp(),
                            status: 'Critical'
                        });

                        statusText.innerText = "Alert Received by Police!";
                        statusText.style.color = "#10b981";
                        sosBtn.style.background = "#10b981";
                        sosBtn.style.boxShadow = "0 0 50px rgba(16, 185, 129, 0.5)";
                        sosBtn.innerHTML = '<i data-lucide="check-circle" style="width: 60px; height: 60px;"></i> SAFE';
                        lucide.createIcons();
                        
                        alert(`CRITICAL ALERT BROADCAST!\nPolice Patrol TS-99 has been dispatched to your current coordinates.\nEstimated Arrival: 4-6 minutes.`);
                    } catch (err) {
                        console.error("SOS Save Failed:", err);
                        statusText.innerText = "Broadcast Error! Try Again.";
                        isSending = false;
                    }

                }, (err) => {
                    statusText.innerText = "GPS Error. Using Static IP.";
                    coordsText.innerText = "17.3850, 78.4867";
                });
            }
        });
    </script>
</body>
</html>
