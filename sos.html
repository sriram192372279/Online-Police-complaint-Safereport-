<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency SOS | SafeReport Telangana</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .sos-container {
            text-align: center;
            z-index: 10;
        }
        .sos-btn-large {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: var(--emergency-red);
            border: 15px solid rgba(239, 68, 68, 0.3);
            color: white;
            font-size: 2.5rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.5);
            transition: transform 0.2s;
            animation: pulse-border 1.5s infinite alternate;
        }
        .sos-btn-large:active {
            transform: scale(0.95);
        }
        @keyframes pulse-border {
            0% { border-width: 15px; border-color: rgba(239, 68, 68, 0.3); }
            100% { border-width: 30px; border-color: rgba(239, 68, 68, 0.1); }
        }
        .status-msg {
            margin-top: 2rem;
            font-size: 1.2rem;
            font-weight: 500;
            color: #ef4444;
            height: 1.5rem;
        }
        .info-panel {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: var(--radius-full);
            display: flex;
            gap: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .location-dot {
            width: 12px;
            height: 12px;
            background: var(--success-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; color: white; display: flex; align-items: center; gap: 0.5rem; opacity: 0.7;">
        <i data-lucide="arrow-left"></i> Back to Safety
    </a>

    <div class="sos-container">
        <button class="sos-btn-large" id="sos-trigger">
            <i data-lucide="alert-triangle" style="width: 50px; height: 50px;"></i>
            SOS
        </button>
        <p class="status-msg" id="status-text">Click the button for immediate assistance</p>
        <p style="opacity: 0.6; margin-top: 1rem;">Misuse of SOS is a punishable offense under IT Act.</p>
    </div>

    <div class="info-panel">
        <div>
            <span class="location-dot"></span>
            GPS: <span id="coords" style="font-family: monospace;">Awaiting Data...</span>
        </div>
        <div>
            <i data-lucide="shield" style="width: 14px; inline-block; vertical-align: middle; color: var(--accent-gold);"></i>
            Signal: <span style="color: var(--success-green);">Strong</span>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const sosBtn = document.getElementById('sos-trigger');
        const statusText = document.getElementById('status-text');
        const coordsText = document.getElementById('coords');
        let isSending = false;

        sosBtn.addEventListener('click', () => {
            if(isSending) return;
            
            isSending = true;
            statusText.innerText = "CAPTURING LIVE GEOLOCATION...";
            statusText.style.color = "#fbbf24";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude.toFixed(6);
                    const lng = pos.coords.longitude.toFixed(6);
                    coordsText.innerText = `${lat}, ${lng}`;
                    
                    statusText.innerText = "ALERT SENT TO NEAREST PATROL TEAM!";
                    statusText.style.color = "#10b981";
                    sosBtn.style.background = "#10b981";
                    sosBtn.style.animation = "none";
                    sosBtn.innerHTML = '<i data-lucide="check-circle" style="width: 50px; height: 50px;"></i> SAFE';
                    lucide.createIcons();
                    
                    alert(`EMERGENCY ALERT BROADCAST!\nLocation: ${lat}, ${lng}\nA patrol car has been dispatched to your location.`);
                }, (err) => {
                    statusText.innerText = "GPS FAILED. SENDING NETWORK LOCATION...";
                    coordsText.innerText = "17.3850, 78.4867 (Hyd Central)";
                });
            }
        });
    </script>
    <script type='module' src='js/global-auth.js'></script>
</body>
</html>
