<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Police Assistance - Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-fixed-dim": "#c1c3ed",
                      "surface-container-high": "#eae7ef",
                      "on-primary": "#ffffff",
                      "on-surface": "#1b1b21",
                      "primary-fixed": "#e0e0ff",
                      "tertiary-container": "#670008",
                      "tertiary": "#400003",
                      "surface-container-low": "#f5f2fb",
                      "surface-tint": "#4c56af",
                      "surface": "#fbf8ff",
                      "on-primary-fixed-variant": "#343d96",
                      "tertiary-fixed-dim": "#ffb3ac",
                      "error": "#ba1a1a",
                      "on-tertiary-container": "#ff635b",
                      "inverse-primary": "#bdc2ff",
                      "on-secondary-fixed": "#151839",
                      "secondary-fixed": "#e0e0ff",
                      "inverse-surface": "#303036",
                      "outline-variant": "#c6c5d4",
                      "primary-fixed-dim": "#bdc2ff",
                      "surface-container-highest": "#e4e1ea",
                      "on-error": "#ffffff",
                      "surface-dim": "#dbd9e1",
                      "surface-bright": "#fbf8ff",
                      "on-secondary-fixed-variant": "#414467",
                      "error-container": "#ffdad6",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#d2d4ff",
                      "on-surface-variant": "#454652",
                      "outline": "#767683",
                      "primary": "#000666",
                      "on-error-container": "#93000a",
                      "surface-container": "#efecf5",
                      "on-tertiary": "#ffffff",
                      "background": "#fbf8ff",
                      "surface-variant": "#e4e1ea",
                      "primary-container": "#1a237e",
                      "on-primary-container": "#8690ee",
                      "on-primary-fixed": "#000767",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#f2eff8",
                      "on-tertiary-fixed-variant": "#930010",
                      "on-secondary-container": "#575b7f",
                      "on-tertiary-fixed": "#410003",
                      "on-background": "#1b1b21",
                      "secondary": "#585c80",
                      "tertiary-fixed": "#ffdad6"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Inter", "sans-serif"
                      ],
                      "body": [
                              "Inter", "sans-serif"
                      ],
                      "label": [
                              "Inter", "sans-serif"
                      ]
              }
      },
          },
        }
      </script>
<style>
        body { font-family: 'Inter', sans-serif; }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden relative selection:bg-primary selection:text-on-primary">
<!-- Live Map Background -->
<div class="absolute inset-0 z-0 bg-surface-container-low">
<img alt="City Map Background" class="w-full h-full object-cover opacity-80" data-alt="Detailed map view of a modern city center with streets, parks, and building footprints visible in a clean, slightly muted cartographic style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAPDSHGqScgzNRsG0Cf279wzse9zBxSXLXN3t0Zd_pU70_QVYWcRKkhAwtttJPF_jqYGypstRhD5eWUlON-4KcKUcGWl_9DhNdCM2YPkAxAe_tS2TpSGVo1iSMNm_k8AJr2f13d3o8ADzMpx7j6PyHeATh2HB0TecWiS7Z0mzvNGPrOjWhKXFcV479AAPI4wfHdgzmxwG1gppUMLjA6Peip5Et-EwT0r4CY_hPSsaBfQqMCMw5itp0UGPTSFprAtdouFxZhtW8Rbg"/>
<!-- Map Overlay Gradient for readability -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/40 via-transparent to-surface/90 mix-blend-multiply"></div>
<!-- Pulse Indicator for User Location -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
<div class="relative w-8 h-8 flex items-center justify-center">
<div class="absolute inset-0 rounded-full bg-primary-fixed-dim/40 animate-ping"></div>
<div class="w-4 h-4 rounded-full bg-primary border-2 border-on-primary shadow-[0_4px_12px_rgba(52,61,150,0.5)]"></div>
</div>
</div>
<!-- Nearby Police Officer Markers -->
<div class="absolute top-1/3 left-1/4">
<div class="flex flex-col items-center">
<div class="bg-surface-container-lowest text-primary p-2 rounded-full shadow-[0_4px_16px_rgba(52,61,150,0.15)] relative">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">local_police</span>
<div class="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[4px] border-l-transparent border-t-[6px] border-t-surface-container-lowest border-r-[4px] border-r-transparent"></div>
</div>
<span class="mt-2 text-[10px] font-bold text-on-surface bg-surface/90 backdrop-blur-sm px-2 py-0.5 rounded-full shadow-sm">Unit 42</span>
</div>
</div>
<div class="absolute top-2/3 right-1/4">
<div class="flex flex-col items-center">
<div class="bg-surface-container-lowest text-primary p-2 rounded-full shadow-[0_4px_16px_rgba(52,61,150,0.15)] relative">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">local_police</span>
<div class="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[4px] border-l-transparent border-t-[6px] border-t-surface-container-lowest border-r-[4px] border-r-transparent"></div>
</div>
<span class="mt-2 text-[10px] font-bold text-on-surface bg-surface/90 backdrop-blur-sm px-2 py-0.5 rounded-full shadow-sm">Unit 17</span>
</div>
</div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0_8px_32px_0_rgba(52,61,150,0.12)]">
<div class="flex justify-between items-center w-full px-6 py-4">
<!-- Leading: Avatar -->
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high border-2 border-outline-variant overflow-hidden shadow-inner">
<img alt="Officer profile photo" class="w-full h-full object-cover" data-alt="Portrait of a young man, closely cropped face, neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6fOtDHQdb-IRG38mdYeS5mSHb6s1PVFbwewJ_DeGC0DJY7nsdMALtllhqtJCjMlWQoM3sv3UDpcveDxMHl2b9WvEKKYfYbqEBsZsY_aykNyw5GYnX30ZaGoKn_KcYyQKpWgsAobI-Okce7L4IAgCJ0iTEcr0z2Gomye3t0DXb5Or6QaYDSz0kT4gpzZj5cM6h4HCfU69ZADLdJZ3h4iLfyj436Y9sBo9TkiaK2Ksr6f2uBCZ8rMzIR2A98t3ZALUEdJeenwrAGoE"/>
</div>
</div>
<!-- Headline -->
<h1 class="text-xl font-black tracking-tighter text-blue-900 dark:text-blue-50 font-inter text-display-sm">Command Center</h1>
<!-- Trailing: Notifications -->
<button class="w-10 h-10 rounded-full flex items-center justify-center text-blue-900 dark:text-blue-100 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-all duration-300 ease-in-out relative">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border border-surface"></span>
</button>
</div>
</header>
<!-- Main Content Area (Floating Actions) -->
<main class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-end pb-32 px-6">
<div class="w-full max-w-md mx-auto pointer-events-auto flex flex-col gap-6 items-end">
<!-- Quick Info Card (Asymmetric) -->
<div class="self-start bg-surface-container-lowest/90 backdrop-blur-md p-4 rounded-xl shadow-[0_8px_24px_rgba(52,61,150,0.08)] flex items-center gap-4 w-64">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Status</p>
<p class="text-sm font-bold text-on-surface">Area Secure</p>
</div>
</div>
<!-- Floating Report Button -->
<button class="flex items-center gap-3 bg-gradient-to-r from-primary to-primary-container text-on-primary px-6 py-4 rounded-full shadow-[0_8px_32px_rgba(0,6,102,0.25)] hover:shadow-[0_12px_40px_rgba(0,6,102,0.35)] active:scale-95 transition-all duration-200 group">
<span class="material-symbols-outlined text-on-primary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">edit_square</span>
<span class="font-bold tracking-wide text-sm">Report Complaint</span>
</button>
<!-- Emergency SOS Button -->
<button class="w-20 h-20 bg-tertiary-container text-on-tertiary-fixed rounded-full shadow-[0_12px_40px_rgba(103,0,8,0.4)] flex flex-col items-center justify-center active:scale-90 transition-all duration-300 border-4 border-surface group mt-4">
<span class="material-symbols-outlined text-3xl group-hover:animate-pulse" style="font-variation-settings: 'FILL' 1;">sos</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-2xl rounded-t-3xl shadow-[0_-8px_32px_0_rgba(52,61,150,0.08)] border-t border-slate-100 dark:border-slate-800">
<div class="flex justify-around items-center px-4 pb-6 pt-3 w-full max-w-md mx-auto">
<!-- Shield (Active) -->
<button class="flex flex-col items-center justify-center bg-blue-900 text-white rounded-2xl px-5 py-2 scale-105 shadow-lg transition-transform duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest">Shield</span>
</button>
<!-- Report -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 opacity-70 hover:opacity-100 hover:text-blue-800 dark:hover:text-blue-200 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">edit_square</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest">Report</span>
</button>
<!-- Track -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 opacity-70 hover:opacity-100 hover:text-blue-800 dark:hover:text-blue-200 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">radar</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest">Track</span>
</button>
<!-- Alerts -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 opacity-70 hover:opacity-100 hover:text-blue-800 dark:hover:text-blue-200 active:scale-95 transition-transform duration-200 relative">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">campaign</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest">Alerts</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
</button>
</div>
</nav>
</body></html>
