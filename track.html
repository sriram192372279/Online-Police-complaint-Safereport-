<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Complaint | SafeReport Telangana</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .track-wrapper {
            padding: 5rem 0;
            background: #f1f5f9;
            min-height: calc(100vh - 80px);
        }
        .search-container {
            max-width: 600px;
            margin: 0 auto 4rem auto;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            background: white;
            padding: 0.75rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 0.75rem 1rem;
            outline: none;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary-blue);
        }
        
        /* Timeline Styles */
        .timeline-card {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 4rem;
            display: none; /* Shown on search */
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .timeline-steps {
            position: relative;
            padding-left: 3rem;
        }
        .timeline-steps::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: #f1f5f9;
            border-radius: 4px;
        }
        .step-item {
            position: relative;
            padding-bottom: 4rem;
        }
        .step-item:last-child { padding-bottom: 0; }
        .step-dot {
            position: absolute;
            left: -3rem;
            top: 0;
            width: 24px;
            height: 24px;
            background: white;
            border: 4px solid #f1f5f9;
            border-radius: 50%;
            z-index: 2;
            transition: var(--transition);
        }
        .step-item.active .step-dot {
            border-color: var(--highlight-blue);
            background: var(--highlight-blue);
            box-shadow: 0 0 0 6px rgba(44, 116, 179, 0.1);
        }
        .step-item.completed .step-dot {
            background: var(--success-green);
            border-color: var(--success-green);
        }
        .step-content h4 {
            font-size: 1.1rem;
            color: var(--primary-blue);
            margin-bottom: 0.25rem;
        }
        .step-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .status-badge-lg {
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.9rem;
            background: #f1f5f9;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="shield-check"></i>
                Safe<span>Report</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="auth.html" class="btn btn-outline">Login</a>
            </nav>
        </div>
    </header>

    <div class="track-wrapper">
        <div class="container">
            <div class="search-container">
                <h1 style="font-size: 2.5rem; color: var(--primary-blue);">Track Case Progress</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Securely monitor the real-time status of your official complaint.</p>
                
                <div class="search-box">
                    <input type="text" id="track-id" placeholder="Enter Case ID (e.g. TS-2026-XXXXXX)">
                    <button class="btn btn-primary" id="search-btn" style="padding: 0 2rem;">
                        <i data-lucide="search"></i>
                        Track Now
                    </button>
                </div>
            </div>

            <div class="timeline-card fade-up" id="tracking-result">
                <div class="timeline-header">
                    <div>
                        <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Complaint Record</span>
                        <h2 id="result-id" style="font-size: 1.75rem; color: var(--primary-blue); margin-top: 0.25rem;">ID: ---</h2>
                        <p style="margin-top: 0.5rem; color: var(--text-muted);">Incident: <span id="result-category" style="font-weight: 600; color: var(--text-dark);">General</span></p>
                    </div>
                    <div id="current-status-badge" class="status-badge-lg">
                        Processing...
                    </div>
                </div>

                <div class="timeline-steps" id="timeline-steps-container">
                    <!-- Dynamic Steps -->
                </div>
                
                <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem;">
                    <i data-lucide="help-circle" style="color: var(--highlight-blue);"></i>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Need more details? Contact the assigned officer via the dashboard portal.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        lucide.createIcons();
        
        const searchBtn = document.getElementById('search-btn');
        const timeline = document.getElementById('tracking-result');
        const trackIdInp = document.getElementById('track-id');
        const resId = document.getElementById('result-id');
        const resCat = document.getElementById('result-category');
        const statusBadge = document.getElementById('current-status-badge');
        const stepsContainer = document.getElementById('timeline-steps-container');

        const statusMap = ['Submitted', 'Under Review', 'Assigned', 'Resolved'];

        async function performTrack(id) {
            if(!id) return;
            
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Tracking...';
            lucide.createIcons();

            const q = query(collection(db, "complaints"), where("complaintId", "==", id.trim()));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                const data = querySnapshot.docs[0].data();
                timeline.style.display = 'block';
                resId.innerText = id.trim();
                resCat.innerText = data.category || 'General';
                const currentStatus = data.status || 'Submitted';
                statusBadge.innerText = currentStatus;
                
                const currentIndex = statusMap.indexOf(currentStatus);
                stepsContainer.innerHTML = '';
                
                statusMap.forEach((status, index) => {
                    let stepClass = '';
                    if (index < currentIndex) stepClass = 'completed';
                    else if (index === currentIndex) stepClass = 'active';
                    
                    let timeStr = 'Awaiting...';
                    if (index <= currentIndex) {
                         timeStr = data.createdAt ? data.createdAt.toDate().toLocaleString() : 'Recent';
                    }

                    stepsContainer.innerHTML += `
                        <div class="step-item ${stepClass}">
                            <div class="step-dot"></div>
                            <div class="step-content">
                                <h4>${status}</h4>
                                <p>${timeStr}</p>
                            </div>
                        </div>
                    `;
                });
                
                lucide.createIcons();
                timeline.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('No complaint found with this ID. Please double check.');
            }
            searchBtn.disabled = false;
            searchBtn.innerHTML = '<i data-lucide="search"></i> Track Now';
            lucide.createIcons();
        }

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('id')) {
            const id = urlParams.get('id');
            trackIdInp.value = id;
            performTrack(id);
        }

        searchBtn.addEventListener('click', () => performTrack(trackIdInp.value));
    </script>
</body>
</html>
